version: '3'
services:
  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    env_file:
      - .env
    environment:
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
    volumes:
      - directus_data:/directus/database
      - directus_uploads:/directus/uploads
volumes:
  directus_data:
  directus_uploads:
